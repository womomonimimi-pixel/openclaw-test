<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 40px 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      font-size: 32px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    .form-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    .messages-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .messages-title {
      color: #333;
      font-size: 20px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #e5e7eb;
    }
    .message-item {
      padding: 16px;
      background: #f9fafb;
      border-radius: 12px;
      margin-bottom: 12px;
      transition: transform 0.2s;
    }
    .message-item:hover {
      transform: translateX(4px);
    }
    .message-item:last-child {
      margin-bottom: 0;
    }
    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .message-author {
      color: #667eea;
      font-weight: 600;
    }
    .message-time {
      color: #9ca3af;
      font-size: 12px;
    }
    .message-content {
      color: #374151;
      line-height: 1.6;
    }
    .empty-message {
      text-align: center;
      color: #9ca3af;
      padding: 40px 20px;
    }
    .message-count {
      color: #667eea;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💬 留言板</h1>
    
    <div class="form-card">
      <form id="messageForm">
        <div class="form-group">
          <label for="author">昵称</label>
          <input type="text" id="author" name="author" placeholder="请输入你的昵称" required>
        </div>
        <div class="form-group">
          <label for="content">留言内容</label>
          <textarea id="content" name="content" placeholder="写下你的留言..." required></textarea>
        </div>
        <button type="submit" class="btn-submit">📝 发表留言</button>
      </form>
    </div>
    
    <div class="messages-card">
      <h2 class="messages-title">留言列表 (<span class="message-count" id="messageCount">0</span>条)</h2>
      <div id="messagesList">
        <div class="empty-message">暂无留言，快来发表第一条留言吧！</div>
      </div>
    </div>
  </div>

  <script>
    // 从 localStorage 获取留言
    function getMessages() {
      const messages = localStorage.getItem('guestbook_messages');
      return messages ? JSON.parse(messages) : [];
    }
    
    // 保存留言到 localStorage
    function saveMessages(messages) {
      localStorage.setItem('guestbook_messages', JSON.stringify(messages));
    }
    
    // 格式化时间
    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
      if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
      
      return date.toLocaleDateString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
    
    // 渲染留言列表
    function renderMessages() {
      const messages = getMessages();
      const messagesList = document.getElementById('messagesList');
      const messageCount = document.getElementById('messageCount');
      
      messageCount.textContent = messages.length;
      
      if (messages.length === 0) {
        messagesList.innerHTML = '<div class="empty-message">暂无留言，快来发表第一条留言吧！</div>';
        return;
      }
      
      // 按时间倒序排列
      const sortedMessages = [...messages].sort((a, b) => b.timestamp - a.timestamp);
      
      messagesList.innerHTML = sortedMessages.map(msg => `
        <div class="message-item">
          <div class="message-header">
            <span class="message-author">${escapeHtml(msg.author)}</span>
            <span class="message-time">${formatTime(msg.timestamp)}</span>
          </div>
          <div class="message-content">${escapeHtml(msg.content)}</div>
        </div>
      `).join('');
    }
    
    // 转义 HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // 提交留言
    document.getElementById('messageForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const author = document.getElementById('author').value.trim();
      const content = document.getElementById('content').value.trim();
      
      if (!author || !content) {
        alert('请填写昵称和留言内容');
        return;
      }
      
      const messages = getMessages();
      messages.push({
        author,
        content,
        timestamp: Date.now()
      });
      
      saveMessages(messages);
      
      // 清空表单
      document.getElementById('content').value = '';
      
      // 重新渲染
      renderMessages();
    });
    
    // 页面加载时渲染留言
    renderMessages();
  </script>
</body>
</html>
